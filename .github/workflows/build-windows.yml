name: Build Windows executable

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the build to (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pyinstaller Pillow

      - name: Build mc2sm.exe
        run: >
          python -m PyInstaller --noconfirm --onefile --windowed --name mc2sm
          --hidden-import PIL._tkinter_finder
          --add-data "resourcepacks;resourcepacks"
          gui.py

      - name: Package
        run: Compress-Archive -Path dist\mc2sm.exe -DestinationPath mc2sm-windows-x86_64.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.inputs.tag || github.event.release.tag_name }}" mc2sm-windows-x86_64.zip --clobber
